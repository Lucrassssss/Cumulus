<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cumulus Auth Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #111827; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #1f2937; padding: 2rem; border-radius: 8px; width: 300px; text-align: center; }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #374151; background: #374151; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #2563eb; }
    #otp-section, #success-section { display: none; }
    #message { margin-top: 15px; font-size: 0.9em; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card">
    <h2>OTP Auth Test</h2>
    
    <div id="email-section">
      <input type="email" id="email" placeholder="hello@example.com" />
      <button onclick="sendOtp()">Send 6-Digit Code</button>
    </div>

    <div id="otp-section">
      <p>Code sent to <span id="display-email"></span></p>
      <input type="text" id="otp" placeholder="123456" maxlength="6" />
      <button onclick="verifyOtp()">Verify Code</button>
    </div>

    <div id="success-section">
      <h3 style="color: #10b981;">✓ Authenticated</h3>
      <p>Session active via Resend SMTP.</p>
    </div>

    <div id="message"></div>
  </div>

  <script>
    const sb = supabase.createClient('https://xyzrvgbdnevllwvxqcka.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5enJ2Z2JkbmV2bGx3dnhxY2thIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NDM0NTAsImV4cCI6MjA5NzQxOTQ1MH0.jfSmMobPUV1tTg2cmyAvTGuRmAyd9C5r-pooMVpSV6E');
    let userEmail = "";

    async function sendOtp() {
      const email = document.getElementById('email').value;
      if (!email) return;
      document.getElementById('message').innerText = 'Sending...';
      
      const { error } = await sb.auth.signInWithOtp({ email });
      
      if (error) {
        document.getElementById('message').innerText = error.message;
      } else {
        userEmail = email;
        document.getElementById('display-email').innerText = email;
        document.getElementById('email-section').style.display = 'none';
        document.getElementById('otp-section').style.display = 'block';
        document.getElementById('message').innerText = 'Check your email for the 6-digit code!';
      }
    }

    async function verifyOtp() {
      const otp = document.getElementById('otp').value;
      if (!otp) return;
      document.getElementById('message').innerText = 'Verifying...';

      const { error, data } = await sb.auth.verifyOtp({
        email: userEmail,
        token: otp,
        type: 'email'
      });

      if (error) {
        document.getElementById('message').innerText = error.message;
      } else if (data.session) {
        document.getElementById('otp-section').style.display = 'none';
        document.getElementById('success-section').style.display = 'block';
        document.getElementById('message').innerText = '';
      }
    }
  </script>
</body>
</html>
