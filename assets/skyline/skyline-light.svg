<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 300" preserveAspectRatio="xMidYMax slice" role="img" aria-label="London skyline">
  <!-- ═══ LONDON SKYLINE — LIGHT (day haze) ═══
       West→East: BT Tower · Big Ben + Parliament · London Eye · St Paul's ·
       Walkie-Talkie · Gherkin · Cheesegrater · The Shard · Tower Bridge ·
       Canary Wharf. Two depth layers; silhouettes only, sky supplied by CSS. -->
  <defs>
    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4EFE6" stop-opacity="0"/>
      <stop offset="1" stop-color="#F4EFE6" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- ── BACK LAYER — distant city blocks, hazy slate ── -->
  <g fill="#CBC4B5" opacity="0.5">
    <rect x="0" y="238" width="52" height="62"/>
    <rect x="36" y="252" width="40" height="48"/>
    <rect x="112" y="244" width="34" height="56"/>
    <rect x="230" y="236" width="44" height="64"/>
    <rect x="300" y="250" width="58" height="50"/>
    <rect x="452" y="230" width="30" height="70"/>
    <rect x="478" y="246" width="42" height="54"/>
    <rect x="600" y="240" width="36" height="60"/>
    <polygon points="648,300 648,218 662,204 676,218 676,300"/>
    <rect x="700" y="232" width="26" height="68"/>
    <rect x="836" y="226" width="30" height="74"/>
    <rect x="862" y="244" width="46" height="56"/>
    <rect x="952" y="238" width="40" height="62"/>
    <rect x="1136" y="240" width="42" height="60"/>
    <rect x="1170" y="228" width="26" height="72"/>
    <rect x="1390" y="242" width="50" height="58"/>
    <rect x="1414" y="230" width="26" height="70"/>
  </g>

  <!-- ── FRONT LAYER — landmarks, slate blue ── -->
  <g fill="#857D6F">
    <!-- BT Tower -->
    <rect x="74" y="140" width="16" height="160"/>
    <rect x="70" y="152" width="24" height="7" rx="2"/>
    <rect x="70" y="164" width="24" height="7" rx="2"/>
    <rect x="70" y="178" width="24" height="6" rx="2"/>
    <rect x="71" y="190" width="22" height="5" rx="2"/>
    <rect x="80" y="118" width="4" height="24"/>
    <rect x="76" y="132" width="12" height="8" rx="1"/>

    <!-- Big Ben (Elizabeth Tower) -->
    <rect x="150" y="168" width="26" height="132"/>
    <rect x="146" y="138" width="34" height="32"/>
    <polygon points="146,138 163,96 180,138"/>
    <rect x="161" y="88" width="4" height="10"/>
    <!-- Parliament + Victoria Tower -->
    <rect x="184" y="232" width="120" height="68"/>
    <rect x="192" y="222" width="6" height="12"/>
    <rect x="212" y="222" width="6" height="12"/>
    <rect x="232" y="222" width="6" height="12"/>
    <rect x="252" y="222" width="6" height="12"/>
    <rect x="272" y="180" width="36" height="120"/>
    <rect x="270" y="170" width="5" height="12"/>
    <rect x="288" y="168" width="5" height="14"/>
    <rect x="304" y="170" width="5" height="12"/>

    <!-- London Eye -->
    <g stroke="#857D6F" fill="none" stroke-width="4">
      <circle cx="390" cy="188" r="76"/>
      <circle cx="390" cy="188" r="62" stroke-width="1.6" opacity="0.55"/>
    </g>
    <g stroke="#857D6F" stroke-width="1.8" opacity="0.8">
      <line x1="390" y1="112" x2="390" y2="264"/>
      <line x1="314" y1="188" x2="466" y2="188"/>
      <line x1="336" y1="134" x2="444" y2="242"/>
      <line x1="444" y1="134" x2="336" y2="242"/>
      <line x1="320" y1="160" x2="460" y2="216"/>
      <line x1="460" y1="160" x2="320" y2="216"/>
      <line x1="362" y1="118" x2="418" y2="258"/>
      <line x1="418" y1="118" x2="362" y2="258"/>
    </g>
    <circle cx="390" cy="188" r="9"/>
    <!-- pods -->
    <g>
      <circle cx="390" cy="110" r="4"/><circle cx="428" cy="122" r="4"/><circle cx="456" cy="150" r="4"/>
      <circle cx="466" cy="188" r="4"/><circle cx="456" cy="226" r="4"/><circle cx="428" cy="254" r="4"/>
      <circle cx="390" cy="266" r="4"/><circle cx="352" cy="254" r="4"/><circle cx="324" cy="226" r="4"/>
      <circle cx="314" cy="188" r="4"/><circle cx="324" cy="150" r="4"/><circle cx="352" cy="122" r="4"/>
    </g>
    <polygon points="352,300 388,196 396,196 428,300 404,300 391,224 376,300"/>

    <!-- St Paul's Cathedral -->
    <rect x="516" y="238" width="12" height="62"/>
    <polygon points="514,238 522,226 530,238"/>
    <rect x="596" y="238" width="12" height="62"/>
    <polygon points="594,238 602,226 610,238"/>
    <rect x="528" y="222" width="68" height="78"/>
    <path d="M530,222 C530,184 552,166 562,164 C572,166 594,184 594,222 Z"/>
    <rect x="556" y="146" width="12" height="20"/>
    <rect x="560" y="134" width="4" height="14"/>
    <rect x="556" y="140" width="12" height="3"/>

    <!-- Walkie-Talkie (20 Fenchurch) -->
    <path d="M646,300 L646,192 C646,170 652,162 664,159 L700,151 C712,149 718,156 718,168 L718,300 Z"/>
    <!-- Gherkin -->
    <path d="M744,300 C738,246 742,204 756,180 C762,169 772,169 778,180 C792,204 796,246 790,300 Z"/>
    <!-- Cheesegrater (Leadenhall) -->
    <polygon points="806,300 806,158 812,152 852,300"/>

    <!-- The Shard -->
    <polygon points="884,300 908,92 911,84 914,92 938,300"/>
    <line x1="906" y1="106" x2="902" y2="300" stroke="#968D7E" stroke-width="1.4"/>
    <line x1="916" y1="106" x2="920" y2="300" stroke="#968D7E" stroke-width="1.4"/>

    <!-- Tower Bridge -->
    <rect x="1000" y="176" width="30" height="124"/>
    <polygon points="998,176 1015,148 1032,176"/>
    <rect x="998" y="172" width="34" height="6"/>
    <rect x="1090" y="176" width="30" height="124"/>
    <polygon points="1088,176 1105,148 1122,176"/>
    <rect x="1088" y="172" width="34" height="6"/>
    <rect x="1030" y="196" width="60" height="7"/>
    <rect x="1030" y="212" width="60" height="7"/>
    <rect x="960" y="268" width="200" height="8"/>
    <path d="M960,268 C984,244 1000,240 1002,240 L1002,248 C994,250 976,258 966,272 Z"/>
    <path d="M1160,268 C1136,244 1120,240 1118,240 L1118,248 C1126,250 1144,258 1154,272 Z"/>

    <!-- Canary Wharf cluster -->
    <rect x="1188" y="196" width="44" height="104"/>
    <rect x="1240" y="150" width="56" height="150"/>
    <polygon points="1240,150 1268,122 1296,150"/>
    <rect x="1304" y="186" width="48" height="114"/>
    <rect x="1356" y="214" width="34" height="86"/>
  </g>

  <!-- morning haze settling on the river line -->
  <rect x="0" y="210" width="1440" height="90" fill="url(#haze)"/>
</svg>
