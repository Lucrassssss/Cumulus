<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 300" preserveAspectRatio="xMidYMax slice" role="img" aria-label="London skyline at night">
  <!-- ═══ LONDON SKYLINE — DARK (night, lit windows, aviation beacons) ═══
       Same geometry as skyline-light.svg; night colourway. -->
  <defs>
    <linearGradient id="cityglow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C9A961" stop-opacity="0"/>
      <stop offset="0.75" stop-color="#C9A961" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#D9995C" stop-opacity="0.16"/>
    </linearGradient>
    <radialGradient id="benface" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F4DFA0" stop-opacity="0.95"/>
      <stop offset="0.8" stop-color="#E8C87A" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#E8C87A" stop-opacity="0.4"/>
    </radialGradient>
  </defs>

  <!-- warm city-light bleed on the horizon -->
  <rect x="0" y="150" width="1440" height="150" fill="url(#cityglow)"/>

  <!-- ── BACK LAYER — distant blocks ── -->
  <g fill="#12151C" opacity="0.92">
    <rect x="0" y="238" width="52" height="62"/>
    <rect x="36" y="252" width="40" height="48"/>
    <rect x="112" y="244" width="34" height="56"/>
    <rect x="230" y="236" width="44" height="64"/>
    <rect x="300" y="250" width="58" height="50"/>
    <rect x="452" y="230" width="30" height="70"/>
    <rect x="478" y="246" width="42" height="54"/>
    <rect x="600" y="240" width="36" height="60"/>
    <polygon points="648,300 648,218 662,204 676,218 676,300"/>
    <rect x="700" y="232" width="26" height="68"/>
    <rect x="836" y="226" width="30" height="74"/>
    <rect x="862" y="244" width="46" height="56"/>
    <rect x="952" y="238" width="40" height="62"/>
    <rect x="1136" y="240" width="42" height="60"/>
    <rect x="1170" y="228" width="26" height="72"/>
    <rect x="1390" y="242" width="50" height="58"/>
    <rect x="1414" y="230" width="26" height="70"/>
  </g>
  <!-- sparse distant windows -->
  <g fill="#E8C87A" opacity="0.28">
    <rect x="14" y="252" width="2.4" height="3.6"/><rect x="30" y="264" width="2.4" height="3.6"/>
    <rect x="122" y="256" width="2.4" height="3.6"/><rect x="246" y="248" width="2.4" height="3.6"/>
    <rect x="318" y="262" width="2.4" height="3.6"/><rect x="462" y="244" width="2.4" height="3.6"/>
    <rect x="612" y="252" width="2.4" height="3.6"/><rect x="710" y="246" width="2.4" height="3.6"/>
    <rect x="846" y="240" width="2.4" height="3.6"/><rect x="962" y="250" width="2.4" height="3.6"/>
    <rect x="1148" y="252" width="2.4" height="3.6"/><rect x="1400" y="254" width="2.4" height="3.6"/>
  </g>

  <!-- ── FRONT LAYER — landmarks, charcoal ── -->
  <g fill="#171A21">
    <!-- BT Tower -->
    <rect x="74" y="140" width="16" height="160"/>
    <rect x="70" y="152" width="24" height="7" rx="2"/>
    <rect x="70" y="164" width="24" height="7" rx="2"/>
    <rect x="70" y="178" width="24" height="6" rx="2"/>
    <rect x="71" y="190" width="22" height="5" rx="2"/>
    <rect x="80" y="118" width="4" height="24"/>
    <rect x="76" y="132" width="12" height="8" rx="1"/>

    <!-- Big Ben + Parliament -->
    <rect x="150" y="168" width="26" height="132"/>
    <rect x="146" y="138" width="34" height="32"/>
    <polygon points="146,138 163,96 180,138"/>
    <rect x="161" y="88" width="4" height="10"/>
    <rect x="184" y="232" width="120" height="68"/>
    <rect x="192" y="222" width="6" height="12"/>
    <rect x="212" y="222" width="6" height="12"/>
    <rect x="232" y="222" width="6" height="12"/>
    <rect x="252" y="222" width="6" height="12"/>
    <rect x="272" y="180" width="36" height="120"/>
    <rect x="270" y="170" width="5" height="12"/>
    <rect x="288" y="168" width="5" height="14"/>
    <rect x="304" y="170" width="5" height="12"/>

    <!-- London Eye -->
    <g stroke="#171A21" fill="none" stroke-width="4">
      <circle cx="390" cy="188" r="76"/>
      <circle cx="390" cy="188" r="62" stroke-width="1.6" opacity="0.6"/>
    </g>
    <g stroke="#171A21" stroke-width="1.8" opacity="0.85">
      <line x1="390" y1="112" x2="390" y2="264"/>
      <line x1="314" y1="188" x2="466" y2="188"/>
      <line x1="336" y1="134" x2="444" y2="242"/>
      <line x1="444" y1="134" x2="336" y2="242"/>
      <line x1="320" y1="160" x2="460" y2="216"/>
      <line x1="460" y1="160" x2="320" y2="216"/>
      <line x1="362" y1="118" x2="418" y2="258"/>
      <line x1="418" y1="118" x2="362" y2="258"/>
    </g>
    <circle cx="390" cy="188" r="9"/>
    <polygon points="352,300 388,196 396,196 428,300 404,300 391,224 376,300"/>

    <!-- St Paul's -->
    <rect x="516" y="238" width="12" height="62"/>
    <polygon points="514,238 522,226 530,238"/>
    <rect x="596" y="238" width="12" height="62"/>
    <polygon points="594,238 602,226 610,238"/>
    <rect x="528" y="222" width="68" height="78"/>
    <path d="M530,222 C530,184 552,166 562,164 C572,166 594,184 594,222 Z"/>
    <rect x="556" y="146" width="12" height="20"/>
    <rect x="560" y="134" width="4" height="14"/>
    <rect x="556" y="140" width="12" height="3"/>

    <!-- Walkie-Talkie -->
    <path d="M646,300 L646,192 C646,170 652,162 664,159 L700,151 C712,149 718,156 718,168 L718,300 Z"/>
    <!-- Gherkin -->
    <path d="M744,300 C738,246 742,204 756,180 C762,169 772,169 778,180 C792,204 796,246 790,300 Z"/>
    <!-- Cheesegrater -->
    <polygon points="806,300 806,158 812,152 852,300"/>

    <!-- The Shard -->
    <polygon points="884,300 908,92 911,84 914,92 938,300"/>

    <!-- Tower Bridge -->
    <rect x="1000" y="176" width="30" height="124"/>
    <polygon points="998,176 1015,148 1032,176"/>
    <rect x="998" y="172" width="34" height="6"/>
    <rect x="1090" y="176" width="30" height="124"/>
    <polygon points="1088,176 1105,148 1122,176"/>
    <rect x="1088" y="172" width="34" height="6"/>
    <rect x="1030" y="196" width="60" height="7"/>
    <rect x="1030" y="212" width="60" height="7"/>
    <rect x="960" y="268" width="200" height="8"/>
    <path d="M960,268 C984,244 1000,240 1002,240 L1002,248 C994,250 976,258 966,272 Z"/>
    <path d="M1160,268 C1136,244 1120,240 1118,240 L1118,248 C1126,250 1144,258 1154,272 Z"/>

    <!-- Canary Wharf -->
    <rect x="1188" y="196" width="44" height="104"/>
    <rect x="1240" y="150" width="56" height="150"/>
    <polygon points="1240,150 1268,122 1296,150"/>
    <rect x="1304" y="186" width="48" height="114"/>
    <rect x="1356" y="214" width="34" height="86"/>
  </g>

  <!-- ── LIT WINDOWS — warm scattered lights ── -->
  <g fill="#E8C87A">
    <!-- Big Ben clock faces (lit) -->
    <circle cx="163" cy="154" r="7.5" fill="url(#benface)"/>
    <!-- Parliament windows -->
    <g opacity="0.5">
      <rect x="192" y="244" width="2.6" height="5"/><rect x="202" y="244" width="2.6" height="5"/>
      <rect x="222" y="244" width="2.6" height="5"/><rect x="242" y="244" width="2.6" height="5"/>
      <rect x="212" y="258" width="2.6" height="5"/><rect x="232" y="258" width="2.6" height="5"/>
      <rect x="252" y="258" width="2.6" height="5"/><rect x="282" y="204" width="2.6" height="5"/>
      <rect x="292" y="218" width="2.6" height="5"/><rect x="284" y="236" width="2.6" height="5"/>
    </g>
    <!-- Walkie-Talkie windows -->
    <g opacity="0.62">
      <rect x="656" y="176" width="3" height="4.5"/><rect x="668" y="172" width="3" height="4.5"/>
      <rect x="682" y="168" width="3" height="4.5"/><rect x="696" y="164" width="3" height="4.5"/>
      <rect x="706" y="184" width="3" height="4.5"/><rect x="662" y="200" width="3" height="4.5"/>
      <rect x="688" y="196" width="3" height="4.5"/><rect x="702" y="214" width="3" height="4.5"/>
      <rect x="654" y="228" width="3" height="4.5"/><rect x="678" y="234" width="3" height="4.5"/>
      <rect x="700" y="248" width="3" height="4.5"/><rect x="664" y="262" width="3" height="4.5"/>
    </g>
    <!-- Gherkin lattice lights -->
    <g opacity="0.55">
      <rect x="758" y="192" width="2.8" height="4"/><rect x="770" y="200" width="2.8" height="4"/>
      <rect x="750" y="216" width="2.8" height="4"/><rect x="778" y="226" width="2.8" height="4"/>
      <rect x="760" y="242" width="2.8" height="4"/><rect x="772" y="258" width="2.8" height="4"/>
      <rect x="752" y="272" width="2.8" height="4"/>
    </g>
    <!-- Cheesegrater -->
    <g opacity="0.5">
      <rect x="812" y="196" width="2.8" height="4.2"/><rect x="818" y="220" width="2.8" height="4.2"/>
      <rect x="826" y="244" width="2.8" height="4.2"/><rect x="834" y="268" width="2.8" height="4.2"/>
    </g>
    <!-- Shard windows -->
    <g opacity="0.66">
      <rect x="905" y="118" width="2.6" height="4"/><rect x="912" y="132" width="2.6" height="4"/>
      <rect x="901" y="150" width="2.6" height="4"/><rect x="915" y="166" width="2.6" height="4"/>
      <rect x="896" y="186" width="2.6" height="4"/><rect x="909" y="200" width="2.6" height="4"/>
      <rect x="920" y="218" width="2.6" height="4"/><rect x="892" y="230" width="2.6" height="4"/>
      <rect x="904" y="248" width="2.6" height="4"/><rect x="925" y="256" width="2.6" height="4"/>
      <rect x="890" y="272" width="2.6" height="4"/><rect x="913" y="280" width="2.6" height="4"/>
    </g>
    <!-- Tower Bridge walkway lights -->
    <g opacity="0.6">
      <rect x="1036" y="198" width="2.4" height="3"/><rect x="1048" y="198" width="2.4" height="3"/>
      <rect x="1060" y="198" width="2.4" height="3"/><rect x="1072" y="198" width="2.4" height="3"/>
      <rect x="1082" y="198" width="2.4" height="3"/>
      <rect x="1010" y="192" width="3" height="4.5"/><rect x="1100" y="192" width="3" height="4.5"/>
    </g>
    <!-- Canary Wharf windows — the working-late grid -->
    <g opacity="0.68">
      <rect x="1250" y="168" width="3" height="4.5"/><rect x="1262" y="168" width="3" height="4.5"/>
      <rect x="1274" y="168" width="3" height="4.5"/><rect x="1286" y="176" width="3" height="4.5"/>
      <rect x="1246" y="190" width="3" height="4.5"/><rect x="1270" y="196" width="3" height="4.5"/>
      <rect x="1282" y="210" width="3" height="4.5"/><rect x="1254" y="222" width="3" height="4.5"/>
      <rect x="1266" y="240" width="3" height="4.5"/><rect x="1288" y="252" width="3" height="4.5"/>
      <rect x="1248" y="266" width="3" height="4.5"/><rect x="1272" y="278" width="3" height="4.5"/>
      <rect x="1196" y="210" width="2.8" height="4.2"/><rect x="1214" y="224" width="2.8" height="4.2"/>
      <rect x="1204" y="248" width="2.8" height="4.2"/><rect x="1220" y="268" width="2.8" height="4.2"/>
      <rect x="1312" y="200" width="2.8" height="4.2"/><rect x="1330" y="218" width="2.8" height="4.2"/>
      <rect x="1320" y="244" width="2.8" height="4.2"/><rect x="1338" y="266" width="2.8" height="4.2"/>
      <rect x="1362" y="228" width="2.8" height="4.2"/><rect x="1376" y="252" width="2.8" height="4.2"/>
    </g>
    <!-- London Eye pods, softly lit -->
    <g opacity="0.75">
      <circle cx="390" cy="110" r="3.4"/><circle cx="428" cy="122" r="3.4"/><circle cx="456" cy="150" r="3.4"/>
      <circle cx="466" cy="188" r="3.4"/><circle cx="456" cy="226" r="3.4"/><circle cx="428" cy="254" r="3.4"/>
      <circle cx="390" cy="266" r="3.4"/><circle cx="352" cy="254" r="3.4"/><circle cx="324" cy="226" r="3.4"/>
      <circle cx="314" cy="188" r="3.4"/><circle cx="324" cy="150" r="3.4"/><circle cx="352" cy="122" r="3.4"/>
    </g>
  </g>

  <!-- ── Aviation beacons — slow red pulse (SMIL; degrades to static dots) ── -->
  <circle cx="911" cy="82" r="2.6" fill="#FF6157">
    <animate attributeName="opacity" values="1;0.12;1" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1268" cy="120" r="2.6" fill="#FF6157">
    <animate attributeName="opacity" values="0.12;1;0.12" dur="3.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="82" cy="116" r="2.2" fill="#FF6157">
    <animate attributeName="opacity" values="1;0.15;1" dur="3.1s" repeatCount="indefinite"/>
  </circle>
</svg>
