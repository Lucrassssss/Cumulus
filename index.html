<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Cumulus — A Private Social Club for London</title>
<meta name="description" content="Cumulus — a private, curated events network for London. Membership by request.">

<!-- ══ iOS / PWA ══ -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cumulus">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B0C0E" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F2F1EE" media="(prefers-color-scheme: light)">

<!-- Instant theme: read saved pref or fall back to OS setting.
     Deliberately inline — it must run before first paint to prevent a
     flash of the wrong theme. The ONLY inline script in the app. -->
<script>
(function(){
  try {
    var p = JSON.parse(localStorage.getItem('prefs') || '{}');
    var t = p.theme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', t);
  } catch(e) {}
})();
</script>

<link id="pwa-apple-icon" rel="apple-touch-icon" href="">
<link id="pwa-apple-icon-precomposed" rel="apple-touch-icon-precomposed" href="">
<link id="pwa-manifest-link" rel="manifest" href="">

<!-- ══ Third-party (CDN) ══ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&family=DM+Sans:ital,opsz,wght@0,9..40,300..900;1,9..40,300..900&family=DM+Mono:ital,wght@0,400;0,500&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>

<!-- ══ App styles ══ -->
<link rel="stylesheet" href="src/css/styles.css">

<!-- ══ App modules — classic scripts with defer: guaranteed execution order
     env → config → services → app. env.js is generated (gitignored); a 404
     here is handled gracefully by config.js (demo mode). ══ -->
<script src="src/js/env.js" defer></script>
<script src="src/js/config.js" defer></script>
<script src="src/js/services.js" defer></script>
<script src="src/js/app.js" defer></script>
</head>
<body>
<a class="skip-link" href="#view-container">Skip to content</a>

<div class="bg-blot blot-a" aria-hidden="true"></div>
<div class="bg-blot blot-b" aria-hidden="true"></div>
<div class="bg-blot blot-c" aria-hidden="true"></div>
<div class="bg-blot blot-d" aria-hidden="true"></div>
<div class="bg-blot blot-e" aria-hidden="true"></div>
<div class="bg-grain" aria-hidden="true"></div>

<!-- Cloud-through transition overlay — shown when entering the app -->
<div id="cloud-veil" aria-hidden="true">
  <div class="cv-sky"></div>
  <div class="cv-stars"></div>
  <div class="cv-city-glow"></div>
  <div class="cv-rays"></div>
  <div class="cv-glow"></div>
  <div class="cv-lightning"></div>
  <!-- 5 parallax cloud lanes — 2 clouds each (staggered 50%) for continuous coverage -->
  <div class="cv-lane cv-lane-1">
    <div class="cv-cloud" style="--spd:55s;--dly:-16s"></div>
    <div class="cv-cloud" style="--spd:55s;--dly:-44s"></div>
  </div>
  <div class="cv-lane cv-lane-2">
    <div class="cv-cloud" style="--spd:42s;--dly:-8s"></div>
    <div class="cv-cloud" style="--spd:42s;--dly:-29s"></div>
  </div>
  <div class="cv-lane cv-lane-3">
    <div class="cv-cloud" style="--spd:35s;--dly:-5s"></div>
    <div class="cv-cloud" style="--spd:35s;--dly:-23s"></div>
  </div>
  <div class="cv-lane cv-lane-4">
    <div class="cv-cloud" style="--spd:28s;--dly:-11s"></div>
    <div class="cv-cloud" style="--spd:28s;--dly:-25s"></div>
  </div>
  <div class="cv-lane cv-lane-5">
    <div class="cv-cloud" style="--spd:22s;--dly:-6s"></div>
    <div class="cv-cloud" style="--spd:22s;--dly:-17s"></div>
  </div>
</div>

<div id="gate-root"></div>
<div id="card-editor-root"></div>

<div id="app" style="display:none;">
  <div id="nav-container"></div>
  <div id="main-map" class="map-host" style="display:none;" role="region" aria-label="Map of member events across London. A keyboard-accessible list of visible events follows the map."></div>
  <div id="map-a11y-list" class="visually-hidden-focusable" aria-label="Events visible on the map"></div>
  <div id="map-filters" class="map-filters" style="display:none;"></div>
  <div id="geocode-banner"></div>
  <div id="map-caption-bar" class="map-caption" style="display:none;"><span class="cap-live"><span class="dot"></span>Live</span> events pulse · tap a pin to view</div>
  <div id="owner-fin-fab" style="display:none;"></div>
  <div id="view-container"></div>
</div>
</body>
</html>
