
# Sign-in code email — shows the raw 6-digit {{ .Token }} instead of a
# clickable link, since the app's auth flow (authSendCode/authVerifyCode in
# src/js/services.js) has users type the code back in rather than following
# a URL. Same template covers both the OTP and magic-link send path.
[auth.email.template.magic_link]
subject = "Your Cumulus sign-in code"
content_path = "./supabase/templates/magic_link.html"

[functions.notify-admin-new-event]
enabled = true
# false: called by our own Postgres trigger via pg_net, not a signed-in
# member — trust is established by the NOTIFY_WEBHOOK_SECRET check inside
# the function instead, same pattern as stripe-webhook's signature check.
verify_jwt = false
entrypoint = "./functions/notify-admin-new-event/index.ts"

[functions.email-ticket]
enabled = true
# true: called by a signed-in member emailing themselves a ticket backup.
verify_jwt = true
entrypoint = "./functions/email-ticket/index.ts"

[functions.create-checkout-session]
enabled = true
# true: called by a signed-in member starting a paid checkout.
verify_jwt = true
entrypoint = "./functions/create-checkout-session/index.ts"

[functions.stripe-webhook]
enabled = true
# false: called by Stripe server-to-server, no user JWT exists on this
# request — trust is the stripe-signature HMAC check inside the function.
verify_jwt = false
entrypoint = "./functions/stripe-webhook/index.ts"

[functions.connect-onboarding]
enabled = true
# true: called by a signed-in host starting/resuming Stripe Connect setup.
verify_jwt = true
entrypoint = "./functions/connect-onboarding/index.ts"

[functions.release-payout]
enabled = true
# false: accepts EITHER a member JWT (self-service, checked manually inside
# the function) OR a RELEASE_PAYOUT_CRON_SECRET bearer token for a scheduled
# job — the gateway's blanket verify_jwt can't express "either of these".
verify_jwt = false
entrypoint = "./functions/release-payout/index.ts"

[functions.cancel-event-refund]
enabled = true
# true: called by a signed-in host or admin cancelling their own event.
verify_jwt = true
entrypoint = "./functions/cancel-event-refund/index.ts"

[functions.invite-past-attendees]
enabled = true
# true: called by a signed-in host promoting a new event to their own
# past-attendee list (get_past_attendee_emails() RPC enforces that server-side).
verify_jwt = true
entrypoint = "./functions/invite-past-attendees/index.ts"

[functions.moderate-image-upload]
enabled = true
# true: called by a signed-in member uploading their own avatar or host
# cover photo. Sole write path for the avatars/covers storage buckets —
# see the migration that drops their old client-writable policies.
verify_jwt = true
entrypoint = "./functions/moderate-image-upload/index.ts"
