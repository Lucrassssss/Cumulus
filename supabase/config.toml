
# Sign-in code email — shows the raw 6-digit {{ .Token }} instead of a
# clickable link, since the app's auth flow (authSendCode/authVerifyCode in
# src/js/services.js) has users type the code back in rather than following
# a URL. Same template covers both the OTP and magic-link send path.
[auth.email.template.magic_link]
subject = "Your Cumulus sign-in code"
content_path = "./supabase/templates/magic_link.html"

[functions.identity-webhook]
enabled = true
# false: this endpoint is called by Stripe, not by a logged-in member, so
# there's no user JWT to check. Trust is instead established per-request by
# verifying the stripe-signature header inside the function itself.
verify_jwt = false
import_map = "./functions/identity-webhook/deno.json"
entrypoint = "./functions/identity-webhook/index.ts"

[functions.create-verification-session]
enabled = true
# true: this endpoint is called by a signed-in member from the app, so the
# gateway must reject missing/expired/invalid tokens before our code runs.
verify_jwt = true
entrypoint = "./functions/create-verification-session/index.ts"

[functions.notify-admin-new-event]
enabled = true
# false: called by our own Postgres trigger via pg_net, not a signed-in
# member — trust is established by the NOTIFY_WEBHOOK_SECRET check inside
# the function instead, same pattern as identity-webhook.
verify_jwt = false
entrypoint = "./functions/notify-admin-new-event/index.ts"
