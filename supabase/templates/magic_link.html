<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cumulus code</title>
  </head>
  <body style="margin:0; padding:0; background:#0d0e10; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0d0e10; padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:420px; background:#16181b; border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:40px 32px;">
            <tr>
              <td align="center" style="padding-bottom:8px;">
                <span style="font-size:13px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#cba43a;">Cumulus</span>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom:24px;">
                <h1 style="margin:0; font-size:20px; font-weight:800; color:#ece9e1;">Your sign-in code</h1>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom:24px;">
                <div style="display:inline-block; background:#0d0e10; border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:18px 28px;">
                  <span style="font-family:'DM Mono',Consolas,Menlo,monospace; font-size:32px; font-weight:600; letter-spacing:8px; color:#ece9e1;">{{ .Token }}</span>
                </div>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom:8px;">
                <p style="margin:0; font-size:14px; line-height:1.6; color:#9a968c;">
                  Enter this code in Cumulus to sign in. It expires shortly, so head back to the app now.
                </p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-top:24px;">
                <p style="margin:0; font-size:12px; line-height:1.6; color:#6b6860;">
                  Didn't request this? You can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
